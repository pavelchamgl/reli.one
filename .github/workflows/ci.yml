# Простой CI: backend (pip, миграции, тесты) и фронты (npm ci, lint, build).
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Без DB_* в настройках включается SQLite (:memory: / файл при migrate).
      SECRET_KEY: ci-secret-key-github-actions-only
      DEBUG: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify no missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests (Django runner)
        run: python manage.py test

      - name: Run tests (pytest)
        run: pytest

  frontend2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Frontend2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/Frontend2/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

  frontend3:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Frontend3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/Frontend3/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present
