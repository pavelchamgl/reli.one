upstream backend {
    server backend:8081;
}

server {
    listen 80;
    server_name reli.one www.reli.one;

    access_log  /var/log/nginx/httpstatus.access.log;
    error_log   /var/log/nginx/httpstatus.error.log;

    client_max_body_size 15M;

    location /reli.one/static/ {
        alias /data/www/static/;
    }

    location /media/ {
        alias /data/www/media/;
    }

    location /admin {
        proxy_pass http://backend/admin;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /api {
        proxy_pass http://backend/api;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location / {
        root /data/www/onlineshop/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name info.reli.one;

    client_max_body_size 15M;

    location /admin {
        proxy_pass http://backend/admin;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location / {
        root /data/www/landing/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
