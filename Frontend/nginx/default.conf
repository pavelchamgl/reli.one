upstream backend {
    server backend:8081;
}

server {
    listen 80;
    server_name reli.one info.reli.one;
    return 301 https://$host$request_uri;
}

server {
    server_name reli.one;
    listen 443 ssl;
    ssl_certificate     /etc/nginx/fullchain.pem;
    ssl_certificate_key /etc/nginx/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Task 006 — baseline security headers + CSP (MVP). TODO: убрать 'unsafe-inline'/'unsafe-eval' после аудита frontend-сборки.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com https://connect.facebook.net https://js.stripe.com https://widget.packeta.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://reli.one https://www.reli.one https://info.reli.one https://www.googleapis.com https://graph.facebook.com https://api.stripe.com https://checkout.stripe.com https://*.paypal.com https://www.paypal.com https://api.paypal.com https://*.sentry.io; frame-src 'self' https://accounts.google.com https://js.stripe.com https://hooks.stripe.com https://www.facebook.com https://www.google.com https://api.dpd.cz https://ps-maps.gls-czech.com https://widget.packeta.com; media-src 'self' https: blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;

    access_log  /var/log/nginx/httpstatus.access.log;
    error_log  /var/log/nginx/httpstatus.error.log;

    client_max_body_size 15M;

    location /reli.one/static/ {
        alias /data/www/static/;
    }

    location /media/ {
        alias /data/www/media/;
    }

    location /admin {
        proxy_pass http://backend/admin;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /api {
        proxy_pass http://backend/api;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location / {
        root /data/www/onlineshop/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    server_name info.reli.one;
    listen 443 ssl;
    ssl_certificate     /etc/nginx/fullchain.pem;
    ssl_certificate_key /etc/nginx/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Task 006 — то же, что для reli.one (единая политика для фронта/лендинга).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com https://connect.facebook.net https://js.stripe.com https://widget.packeta.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://reli.one https://www.reli.one https://info.reli.one https://www.googleapis.com https://graph.facebook.com https://api.stripe.com https://checkout.stripe.com https://*.paypal.com https://www.paypal.com https://api.paypal.com https://*.sentry.io; frame-src 'self' https://accounts.google.com https://js.stripe.com https://hooks.stripe.com https://www.facebook.com https://www.google.com https://api.dpd.cz https://ps-maps.gls-czech.com https://widget.packeta.com; media-src 'self' https: blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;

    location /admin {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
